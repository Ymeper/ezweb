<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            color: #333;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 48px;
            color: #3d3d3d;
        }

        p {
            margin-top: 8px;
            color: #666;
        }

        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 14px;
        }

        footer {
            padding: 20px;
            font-size: 12px;
            color: #999;
        }

        footer a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <main>
        <h1>404</h1>
        <p>The router <code>{{request.url.path | default("unknown")}}</code> could not be found.</p>
    </main>
    <footer>
        Driven by <a href="https://github.com/Ymeper/ezweb">ezweb</a>
    </footer>
</body>

</html>
